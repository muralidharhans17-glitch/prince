<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PRINCE - Advanced Slide Compiler</title>
    <!-- PDF.js for rendering pages -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <!-- jsPDF for generating output -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    
    <style>
        :root {
            --bg-primary: #0f172a;
            --bg-card: #1e293b;
            --text-main: #f8fafc;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --border: #334155;
        }

        /* Clean Background Mode Overrides */
        body.clean-mode {
            --bg-primary: #f8fafc;
            --bg-card: #ffffff;
            --text-main: #0f172a;
            --border: #cbd5e1;
            --accent: #1d4ed8;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            transition: background-color 0.3s, border-color 0.3s;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-main);
            padding: 2rem;
            min-height: 100vh;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            animation: fadeIn 0.8s ease;
        }

        h1 {
            font-size: 2rem;
            letter-spacing: -0.05em;
        }

        .controls-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .card {
            background-color: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.5rem;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            animation: slideUp 0.5s ease-out;
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 0.5rem;
            font-size: 0.875rem;
        }

        .btn {
            background-color: var(--accent);
            color: white;
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .btn:hover {
            background-color: var(--accent-hover);
        }

        .btn-secondary {
            background-color: transparent;
            border: 1px solid var(--border);
            color: var(--text-main);
            width: auto;
            padding: 0.5rem 1rem;
        }

        select, input[type="file"] {
            width: 100%;
            padding: 0.5rem;
            border-radius: 6px;
            background: var(--bg-primary);
            color: var(--text-main);
            border: 1px solid var(--border);
        }

        /* Preview Page Selection Area */
        #previewZone {
            display: none;
            margin-bottom: 2rem;
        }

        .select-all-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid var(--border);
        }

        .page-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 1rem;
            max-height: 300px;
            overflow-y: auto;
            padding: 0.5rem;
            border: 1px dashed var(--border);
            border-radius: 8px;
        }

        .page-item {
            position: relative;
            cursor: pointer;
            border: 2px solid transparent;
            border-radius: 6px;
            overflow: hidden;
            background: #000;
        }

        .page-item canvas {
            width: 100%;
            display: block;
            opacity: 0.6;
        }

        .page-item.selected {
            border-color: var(--accent);
        }

        .page-item.selected canvas {
            opacity: 1;
        }

        .page-badge {
            position: absolute;
            top: 4px;
            left: 4px;
            background: rgba(0,0,0,0.75);
            color: white;
            padding: 2px 6px;
            font-size: 10px;
            border-radius: 4px;
        }

        /* Overlay / Game Center during Processing */
        #processingOverlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(15, 23, 42, 0.95);
            z-index: 9999;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
        }

        .processing-pulse {
            width: 60px;
            height: 60px;
            background: var(--accent);
            border-radius: 50%;
            animation: pulseAnimation 1.5s infinite ease-in-out;
            margin-bottom: 1rem;
        }

        /* The Processing Mini-Game CSS */
        #gameContainer {
            margin-top: 2rem;
            background: #1e293b;
            padding: 1.5rem;
            border-radius: 12px;
            border: 1px solid #334155;
            text-align: center;
            width: 320px;
        }

        #gameCanvas {
            background: #0f172a;
            border-radius: 6px;
            display: block;
            margin: 10px auto;
        }

        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; } to { opacity: 1; }
        }
        @keyframes slideUp {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        @keyframes pulseAnimation {
            0% { transform: scale(0.8); opacity: 0.5; }
            50% { transform: scale(1.2); opacity: 1; }
            100% { transform: scale(0.8); opacity: 0.5; }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>PRINCE <span style="font-size: 1rem; opacity: 0.6;">v2.0 Matrix</span></h1>
        <button class="btn btn-secondary" id="themeToggle" onclick="toggleTheme()">✨ Clean Background</button>
    </header>

    <div class="controls-grid">
        <!-- File Input Card -->
        <div class="card">
            <label for="pdfFile">Step 1: Ingest Study Asset</label>
            <input type="file" id="pdfFile" accept="application/pdf" onchange="handleFileLoad(event)">
        </div>

        <!-- Design Layout Selector Card -->
        <div class="card">
            <label for="layoutSelect">Step 2: Exchange Layout Pattern</label>
            <select id="layoutSelect">
                <option value="1">1 Slide Per Page (Standard Landscape)</option>
                <option value="2">2 Slides Per Page (Split Layout View)</option>
                <option value="4" selected>4 Slides Per Page (Quad Compact Grid)</option>
            </select>
        </div>
    </div>

    <!-- Interactive Page Preview Panel -->
    <div class="card" id="previewZone">
        <div class="select-all-bar">
            <h3>Filter Layout Pipeline</h3>
            <label style="margin:0; display:flex; align-items:center; gap:0.5rem; cursor:pointer;">
                <input type="checkbox" id="selectAllCheckbox" checked onchange="toggleSelectAll(this)">
                Select All Pages
            </label>
        </div>
        <div class="page-grid" id="pageGridContainer"></div>
    </div>

    <!-- Action Output Trigger -->
    <button class="btn" style="font-size:1.1rem; padding:1rem;" id="generateBtn" onclick="processCustomPDF()" disabled>
        ⚡ Run Compilation Pipeline
    </button>
</div>

<!-- Immersive Processing Overlay Canvas & Arcade Block -->
<div id="processingOverlay">
    <div class="processing-pulse"></div>
    <h2>Executing Matrix Layout Restructuring...</h2>
    <p style="opacity: 0.6; margin-top: 0.25rem;">Compiling isolated viewport matrices</p>

    <!-- Flappy Dot Arcade Block -->
    <div id="gameContainer">
        <h4 style="margin-bottom: 0.5rem;">Matrix Flapper Mini-Game</h4>
        <canvas id="gameCanvas" width="280" height="150"></canvas>
        <button class="btn" style="padding: 0.4rem;" onclick="flapBird()">JUMP</button>
        <p style="font-size: 12px; opacity: 0.5; margin-top: 6px;">Tap Jump to bounce through security nodes</p>
    </div>
</div>

<script>
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';
    
    let currentPdfDoc = null;
    let selectedPages = [];
    let gameLoopInterval = null;

    function toggleTheme() {
        document.body.classList.toggle('clean-mode');
        const btn = document.getElementById('themeToggle');
        btn.innerText = document.body.classList.contains('clean-mode') ? "🌌 Matrix Dark Mode" : "✨ Clean Background";
    }

    async function handleFileLoad(e) {
        const file = e.target.files[0];
        if (!file) return;

        const arrayBuffer = await file.arrayBuffer();
        currentPdfDoc = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
        
        // Show selection window
        document.getElementById('previewZone').style.display = 'block';
        document.getElementById('generateBtn').disabled = false;
        
        renderPageSelectionGrid();
    }

    async function renderPageSelectionGrid() {
        const container = document.getElementById('pageGridContainer');
        container.innerHTML = '';
        selectedPages = [];

        for (let i = 1; i <= currentPdfDoc.numPages; i++) {
            selectedPages.push(i); // default select all

            const page = await currentPdfDoc.getPage(i);
            const viewport = page.getViewport({ scale: 0.2 });

            const div = document.createElement('div');
            div.className = 'page-item selected';
            div.id = `pitem-${i}`;
            div.onclick = () => togglePageSelection(i);

            const canvas = document.createElement('canvas');
            canvas.width = viewport.width;
            canvas.height = viewport.height;
            const ctx = canvas.getContext('2d');

            const badge = document.createElement('div');
            badge.className = 'page-badge';
            badge.innerText = `P. ${i}`;

            div.appendChild(canvas);
            div.appendChild(badge);
            container.appendChild(div);

            await page.render({ canvasContext: ctx, viewport: viewport }).promise;
        }
    }

    function togglePageSelection(pageNum) {
        const index = selectedPages.indexOf(pageNum);
        const item = document.getElementById(`pitem-${pageNum}`);
        
        if (index > -1) {
            selectedPages.splice(index, 1);
            item.classList.remove('selected');
            document.getElementById('selectAllCheckbox').checked = false;
        } else {
            selectedPages.push(pageNum);
            selectedPages.sort((a, b) => a - b);
            item.classList.add('selected');
        }
    }

    function toggleSelectAll(master) {
        selectedPages = [];
        const items = document.querySelectorAll('.page-item');
        items.forEach((item, idx) => {
            const pNum = idx + 1;
            if (master.checked) {
                selectedPages.push(pNum);
                item.classList.add('selected');
            } else {
                item.classList.remove('selected');
            }
        });
    }

    async function processCustomPDF() {
        if (selectedPages.length === 0) {
            alert('Please pick at least one slide page to generate!');
            return;
        }

        // Trigger loading screen and clear/start arcade loop
        document.getElementById('processingOverlay').style.display = 'flex';
        startMiniGame();

        setTimeout(async () => {
            try {
                const { jsPDF } = window.jspdf;
                const outDoc = new jsPDF({ orientation: 'landscape', unit: 'px', format: 'a4' });
                const outW = outDoc.internal.pageSize.getWidth();
                const outH = outDoc.internal.pageSize.getHeight();

                const layoutPattern = parseInt(document.getElementById('layoutSelect').value);
                
                let currentLayoutCount = 0;
                let pageCanvas = document.createElement('canvas');
                let pageCtx = pageCanvas.getContext('2d');

                for (let i = 0; i < selectedPages.length; i++) {
                    const actualPageNum = selectedPages[i];
                    const page = await currentPdfDoc.getPage(actualPageNum);
                    const viewport = page.getViewport({ scale: 2.0 });

                    pageCanvas.width = viewport.width;
                    pageCanvas.height = viewport.height;
                    await page.render({ canvasContext: pageCtx, viewport: viewport }).promise;

                    if (currentLayoutCount > 0 && currentLayoutCount % layoutPattern === 0) {
                        outDoc.addPage();
                    }

                    let targetX = 0, targetY = 0, targetW = outW, targetH = outH;

                    if (layoutPattern === 2) {
                        targetW = outW / 2;
                        targetX = (currentLayoutCount % 2) * targetW;
                    } else if (layoutPattern === 4) {
                        targetW = outW / 2;
                        targetH = outH / 2;
                        targetX = (currentLayoutCount % 2) * targetW;
                        targetY = Math.floor((currentLayoutCount % 4) / 2) * targetH;
                    }

                    const imgData = pageCanvas.toDataURL('image/jpeg', 0.85);
                    outDoc.addImage(imgData, 'JPEG', targetX, targetY, targetW, targetH);
                    currentLayoutCount++;
                }

                outDoc.save('Prince_Matrix_Compilation.pdf');
            } catch (err) {
                console.error(err);
                alert('An error occurred during layout conversion mapping.');
            } finally {
                stopMiniGame();
                document.getElementById('processingOverlay').style.display = 'none';
            }
        }, 800);
    }

    /* Single-Button Flappy Dot Engine */
    let gCanvas, gCtx;
    let dotY, dotVelocity, obstacles, gameScore;

    function startMiniGame() {
        gCanvas = document.getElementById('gameCanvas');
        gCtx = gCanvas.getContext('2d');
        dotY = 75;
        dotVelocity = 0;
        obstacles = [];
        gameScore = 0;

        if(gameLoopInterval) clearInterval(gameLoopInterval);
        gameLoopInterval = setInterval(updateGameFrame, 20);
    }

    function stopMiniGame() {
        clearInterval(gameLoopInterval);
    }

    function flapBird() {
        dotVelocity = -3.5;
    }

    function updateGameFrame() {
        dotVelocity += 0.15; // gravity
        dotY += dotVelocity;

        // Keep inside bounds
        if (dotY > 145) dotY = 145;
        if (dotY < 5) dotY = 5;

        // Obstacles generation pipeline
        if (obstacles.length === 0 || obstacles[obstacles.length - 1].x < 180) {
            let gapPosition = Math.random() * 60 + 20;
            obstacles.push({ x: 280, gapTop: gapPosition, gapBottom: gapPosition + 45 });
        }

        obstacles.forEach(obs => obs.x -= 2);

        // Score tracker mapping
        if (obstacles.length > 0 && obstacles[0].x === 40) {
            gameScore++;
        }

        // Filter offscreen nodes
        if (obstacles.length > 0 && obstacles[0].x < -20) {
            obstacles.shift();
        }

        // Draw Sequence Matrix
        gCtx.clearRect(0, 0, gCanvas.width, gCanvas.height);
        
        // Target player node
        gCtx.fillStyle = '#3b82f6';
        gCtx.beginPath();
        gCtx.arc(50, dotY, 6, 0, Math.PI * 2);
        gCtx.fill();

        // Security barricade bars
        gCtx.fillStyle = '#ef4444';
        obstacles.forEach(obs => {
            gCtx.fillRect(obs.x, 0, 15, obs.gapTop);
            gCtx.fillRect(obs.x, obs.gapBottom, 15, gCanvas.height - obs.gapBottom);
        });

        // Dynamic Score Text
        gCtx.fillStyle = '#ffffff';
        gCtx.font = 'bold 12px sans-serif';
        gCtx.fillText(`Nodes Passed: ${gameScore}`, 10, 20);
    }
</script>
</body>
</html>
